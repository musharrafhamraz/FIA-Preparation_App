name: Scrape Questions Daily

on:
  schedule:
    # Run every day at 2 AM UTC (7 AM Pakistan Time)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'assets/scraper_ondemand.py'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run scraper
        run: |
          cd assets
          python scraper_ondemand.py --count 50 --category all --output ../questions.json
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add questions.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update questions - $(date +'%Y-%m-%d %H:%M')" && git push)
